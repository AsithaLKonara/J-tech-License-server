<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Bridge License Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1200px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .login-form {
            max-width: 400px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .dashboard {
            display: none;
        }

        .dashboard.active {
            display: block;
        }

        .user-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .user-info h2 {
            color: #333;
            margin-bottom: 15px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .info-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .info-item label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .info-item span {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .features-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .feature-badge {
            background: #667eea;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #3c3;
        }

        .logout-btn {
            background: #dc3545;
            margin-top: 20px;
        }

        .logout-btn:hover {
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.4);
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Upload Bridge License Dashboard</h1>
            <p>Manage your licenses and account</p>
        </div>

        <div class="content">
            <!-- Login Form -->
            <div id="loginForm" class="login-form">
                <div id="errorMessage" class="error" style="display: none;"></div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="test@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button class="btn" onclick="login()">Login</button>
                <div style="margin-top: 20px; text-align: center; color: #666; font-size: 14px;">
                    <p><strong>Test Accounts:</strong></p>
                    <p>test@example.com / testpassword123</p>
                    <p>demo@example.com / demo123</p>
                </div>
            </div>

            <!-- Dashboard -->
            <div id="dashboard" class="dashboard">
                <div class="user-info">
                    <h2>👤 User Information</h2>
                    <div class="info-grid">
                        <div class="info-item">
                            <label>Email</label>
                            <span id="userEmail">-</span>
                        </div>
                        <div class="info-item">
                            <label>User ID</label>
                            <span id="userId">-</span>
                        </div>
                        <div class="info-item">
                            <label>Plan</label>
                            <span id="userPlan">-</span>
                        </div>
                        <div class="info-item">
                            <label>Product</label>
                            <span id="userProduct">-</span>
                        </div>
                    </div>
                    <div style="margin-top: 15px;">
                        <label>Features</label>
                        <div id="userFeatures" class="features-list"></div>
                    </div>
                </div>

                <div id="successMessage" class="success" style="display: none;"></div>
                <div id="errorMessage2" class="error" style="display: none;"></div>

                <button class="btn logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        // Check if user is already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const sessionToken = localStorage.getItem('session_token');
            const userInfo = localStorage.getItem('user_info');
            
            if (sessionToken && userInfo) {
                try {
                    const user = JSON.parse(userInfo);
                    showDashboard(user);
                } catch (e) {
                    localStorage.removeItem('session_token');
                    localStorage.removeItem('user_info');
                    localStorage.removeItem('entitlement_token');
                }
            }
        });

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const loginBtn = document.querySelector('.btn');

            if (!email || !password) {
                showError('Please enter email and password');
                return;
            }

            errorDiv.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';

            try {
                const response = await fetch(`${API_BASE}/api/v2/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        device_id: 'WEB_DASHBOARD_' + Date.now(),
                        device_name: 'Web Dashboard'
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Login failed');
                }

                // Store tokens and user info
                localStorage.setItem('session_token', data.session_token);
                localStorage.setItem('user_info', JSON.stringify(data.user));
                localStorage.setItem('entitlement_token', JSON.stringify(data.entitlement_token));

                showDashboard(data.user, data.entitlement_token);
                showSuccess('Login successful!');

            } catch (error) {
                showError(error.message || 'Login failed. Please check your credentials.');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        }

        function showDashboard(user, entitlement) {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');

            // Load entitlement from localStorage if not provided
            if (!entitlement) {
                try {
                    entitlement = JSON.parse(localStorage.getItem('entitlement_token'));
                } catch (e) {
                    entitlement = null;
                }
            }

            document.getElementById('userEmail').textContent = user.email || '-';
            document.getElementById('userId').textContent = user.id || '-';
            
            if (entitlement) {
                document.getElementById('userPlan').textContent = entitlement.plan || '-';
                document.getElementById('userProduct').textContent = entitlement.product || '-';
                
                const featuresDiv = document.getElementById('userFeatures');
                if (entitlement.features && entitlement.features.length > 0) {
                    featuresDiv.innerHTML = entitlement.features.map(f => 
                        `<span class="feature-badge">${f}</span>`
                    ).join('');
                } else {
                    featuresDiv.innerHTML = '<span style="color: #666;">No features</span>';
                }
            }
        }

        function logout() {
            localStorage.removeItem('session_token');
            localStorage.removeItem('user_info');
            localStorage.removeItem('entitlement_token');
            
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('errorMessage2').style.display = 'none';
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }

        // Allow Enter key to submit login
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
